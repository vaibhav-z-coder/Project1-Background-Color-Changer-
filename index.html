<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="heading">Color Changer</h1>

        <div class="inputBtnContainer">
            <button class="randomBtn">Random Color</button>

            <input 
                type="text" 
                id="colorInput" 
                placeholder="Enter hex (#ff0000) or color name"
            >

            <button class="applyBtn">Apply Color</button>
        </div>

        <p class="currentColor">
            Current Color: 
            <span class="currentColorValue">None</span>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
